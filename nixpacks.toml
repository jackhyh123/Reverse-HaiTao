# Nixpacks configuration for DeepTutor backend
# Auto-detects Python + installs from requirements.txt

[phases.setup]
# "..." extends auto-detected packages rather than replacing them
aptPkgs = ["...", "build-essential", "libgl1", "libglib2.0-0", "libsm6", "libxext6", "libxrender1", "pkg-config", "libssl-dev", "curl"]

[start]
cmd = "python -m uvicorn deeptutor.api.main:app --host 0.0.0.0 --port ${PORT:-8001}"
